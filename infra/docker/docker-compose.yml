services:
  postgres:
    image: postgres:16-alpine
    container_name: investiga-postgres
    environment:
      POSTGRES_DB: investiga_tijucas
      POSTGRES_USER: investiga
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-investiga_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U investiga -d investiga_tijucas"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: investiga-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: investiga
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-investiga_dev}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: investiga-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
